project_root: tests/project_folder
metadata_config_path: configs/metadata_configs/test-data-categorical-5.json

model_type: generative
training_objective: causal
model_path: models/sequifier-test-hp-search-custom-eval-run-0-best-1.pt

data_path: data/test-data-categorical-5-split2
read_format: pt
write_format: csv

input_columns:
- itemId
- supCat1
- supCat2
- supCat3
- supCat4
target_columns:
- itemId
- supCat1
- supCat2
- supCat3
- supCat4
target_column_types:
  itemId: categorical
  supCat1: categorical
  supCat2: categorical
  supCat3: categorical
  supCat4: categorical

output_probabilities: false
map_to_id: true
device: cpu
seq_length: 8
prediction_length: 1
inference_batch_size: 10
enforce_determinism: true

# Autoregression
autoregression: true
autoregression_total_steps: 30
