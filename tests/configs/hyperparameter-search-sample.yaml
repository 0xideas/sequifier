project_root: tests/project_folder
metadata_config_path: tests/project_folder/configs/metadata_configs/test-data-categorical-5.json
hp_search_name: test-hp-search-sample
model_config_write_path: configs

read_format: pt
target_columns: [itemId]
target_column_types:
  itemId: categorical
seq_length: [8]
inference_batch_size: 10

# Search Strategy
search_strategy: sample
n_samples: 4

# Configuration Loading Overrides
input_columns: null
export_embedding_model: false
export_generative_model: true
export_onnx: false
export_pt: true
export_with_dropout: false

# Model Hyperparameter Search Space using Distributions
model_hyperparameter_sampling:
  initial_embedding_dim: [40]
  joint_embedding_dim: [null]
  feature_embedding_dims: null
  dim_model: [40]
  n_head: [2]
  # IntDistribution test with step
  dim_feedforward:
    low: 10
    high: 20
    step: 2
  # IntDistribution test without step
  num_layers:
    low: 1
    high: 3
  activation_fn: ["swiglu"]
  normalization: ["rmsnorm"]
  positional_encoding: ["rope"]
  attention_type: ["mqa"]
  norm_first: [true]
  n_kv_heads: [1]
  # FloatDistribution test with log
  rope_theta:
    low: 1000.0
    high: 10000.0
    log: true
  prediction_length: 1

# Training Hyperparameter Search Space using Distributions
training_hyperparameter_sampling:
  training_objective: ["causal"]
  device: cpu
  epochs: [1]
  save_interval_epochs: 10
  # IntDistribution test
  batch_size:
    low: 5
    high: 15
    step: 5
  learning_rate: [0.001]
  criterion:
    itemId: CrossEntropyLoss
  # IntDistribution test
  accumulation_steps:
    low: 1
    high: 2
  # FloatDistribution test without log
  dropout:
    low: 0.1
    high: 0.5
    log: true
  optimizer:
    - name: Adam
  scheduler:
    - name: StepLR
      step_size: 1
      gamma: 0.99
  log_interval: 5
  continue_training: false

override_input: true
