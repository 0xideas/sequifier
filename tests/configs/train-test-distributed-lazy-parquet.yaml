project_root: tests/project_folder
model_name: model-categorical-distributed-lazy-parquet
read_format: parquet
metadata_config_path: configs/metadata_configs/test-data-categorical-multitarget-5.json

input_columns: [itemId, supCat1]
target_columns: [itemId]
target_column_types:
  itemId: categorical

seq_length: 8
window_length: 9
inference_batch_size: 2

export_generative_model: true
export_embedding_model: false
export_onnx: true
export_pt: true

model_spec:
  initial_embedding_dim: 16
  dim_model: 16
  n_head: 2
  dim_feedforward: 16
  num_layers: 1
  prediction_length: 1

training_spec:
  window_length: 9
  training_objective: causal
  device: cpu
  epochs: 3
  log_interval: 1
  save_interval_epochs: 1
  batch_size: 5
  learning_rate: 0.001
  criterion:
    itemId: CrossEntropyLoss
  optimizer:
    name: Adam
  scheduler:
    name: StepLR
    step_size: 1
    gamma: 0.1

  # --- The Magic Combination ---
  distributed: true             # Triggers mp.spawn + gloo
  data_parallelism: 'DDP'
  world_size: 2
  backend: gloo
  sampling_strategy: 'oversampling'
  num_workers: 2                # Triggers thread contention
  load_full_data_to_ram: false  # Triggers SequifierDatasetFromFolderParquetLazy
  continue_training: false
