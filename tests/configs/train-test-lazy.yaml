project_root: tests/project_folder
metadata_config_path: configs/metadata_configs/test-data-categorical-3.json
model_name: model-categorical-lazy
training_data_path: data/test-data-categorical-3-split0
validation_data_path: data/test-data-categorical-3-split1
read_format: pt

input_columns: [itemId, supCat1]
target_columns: [itemId]
target_column_types:
  itemId: categorical

seq_length: 8
inference_batch_size: 2

export_generative_model: true
export_embedding_model: false
export_onnx: true
export_pt: true

model_spec:
  initial_embedding_dim: 16
  dim_model: 16
  n_head: 2
  dim_feedforward: 16
  num_layers: 1
  prediction_length: 1

training_spec:
  device: cpu
  epochs: 3
  log_interval: 1
  save_interval_epochs: 1
  batch_size: 5
  learning_rate: 0.001
  criterion:
    itemId: CrossEntropyLoss
  optimizer:
    name: Adam
  scheduler:
    name: StepLR
    step_size: 1
    gamma: 0.1

  # --- Lazy Loading Setting ---
  load_full_data_to_ram: false
  continue_training: false
